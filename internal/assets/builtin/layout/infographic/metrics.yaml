schema_version: "1"
name: metrics
version: "1.0.0"
since: "1.5.0"
category: infographic
serves: [attention, memorability]
content_types: [report, announcement, product-launch]
industry: [general]
tags: [infographic, metrics, data, numbers, kpi]
position: body
when_to_use: |
  展示关键数字、结果、变化。
  适合结果汇报、增长复盘、方案提案。
when_not_to_use: |
  只有一个数字时用 infographic type:data；
  多项指标对比用 compare。
pairs_well_with: [infographic, compare, verdict]
avoid_combining_with: []
anti_pattern: |
  没有任何满足 3 列的行导致渲染失败；
  数值列写成纯文字而非简洁数字；
  每行都用 accent 失去重点突出效果。
rows:
  delimiter: "|"
  min_columns: 3
  schema:
    - name: label
      description: 指标名称
    - name: value
      description: 核心数值（如 38 模块、-42%）
    - name: suffix
      description: 说明文字，解释数值的含义
    - name: style
      description: "风格：accent 或 default（可省略）"
      enum: [accent, default]
example: |
  :::metrics[核心数据]
  结构复用 | 38 模块 | 同一篇内容可切到不同主题 | accent
  制作负担 | -42% | 固定骨架后，不再反复重搭版式 | default
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#metrics"
