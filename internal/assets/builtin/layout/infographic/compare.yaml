schema_version: "1"
name: compare
version: "1.0.0"
since: "1.5.0"
category: infographic
serves: [readability, attention]
content_types: [opinion, tutorial, report, announcement]
industry: [general]
tags: [infographic, compare, contrast, before-after, options]
position: body
when_to_use: |
  比较旧方式和新方式、方案 A 和方案 B。
  适合升级说明、选型建议、改版对比。
when_not_to_use: |
  只有一个维度对比用 infographic type:contrast；
  纯数字对比用 metrics；图片对比用 image-compare。
pairs_well_with: [infographic, metrics, steps]
avoid_combining_with: []
anti_pattern: |
  没有任何满足 4 列的行导致渲染失败；
  左右两侧的标签写在行里而非标题；
  每行对比项差异不明显。
rows:
  delimiter: "|"
  min_columns: 4
  schema:
    - name: left-title
      description: 左侧方案名称（如"旧方式"、"方案 A"）
    - name: left-description
      description: 左侧方案说明
    - name: right-title
      description: 右侧方案名称（如"新方式"、"方案 B"）
    - name: right-description
      description: 右侧方案说明
example: |
  :::compare[旧方式 | 新方式]
  手工堆样式 | 每篇都要重搭结构，容易乱 | 模块化排版 | 节奏固定，替换内容就能稳定复用
  硬塞双列 | 手机里容易挤，信息也容易断开 | 单列卡片 | 重点成组出现，阅读更稳定
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#compare"
