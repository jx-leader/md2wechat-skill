schema_version: "1"
name: timeline
version: "1.0.0"
since: "1.5.0"
category: infographic
serves: [readability]
content_types: [report, announcement, tutorial]
industry: [general]
tags: [infographic, timeline, history, phases, evolution]
position: body
when_to_use: |
  阶段、时间、演进路径。
  适合产品演进、历史梳理、多阶段场景说明。
when_not_to_use: |
  步骤流程用 steps；版本日志用 changelog（sprint4）。
pairs_well_with: [part, steps, metrics]
avoid_combining_with: []
anti_pattern: |
  没有任何满足 3 列的行导致渲染失败；
  阶段列写太多导致视觉混乱；
  和 steps 混用（timeline 强调时序，steps 强调动作）。
rows:
  delimiter: "|"
  min_columns: 3
  schema:
    - name: date
      description: 阶段或时间标签（如"品牌稿"、"2026-01"）
    - name: title
      description: 该阶段的事件或标题
    - name: description
      description: 说明，补充这个阶段的背景或意义
example: |
  :::timeline[应用场景]
  品牌稿 | 开头先用封面卡 | 适合活动稿、专题稿、发布稿。
  方案稿 | 中间用数据和对比 | 适合把价值和差异讲清楚。
  交付稿 | 末尾接清单和行动 | 让读者知道下一步该做什么。
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#timeline"
