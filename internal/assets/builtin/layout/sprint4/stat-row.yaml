schema_version: "1"
name: stat-row
version: "1.0.0"
since: "1.5.0"
category: sprint4
serves: [attention, memorability]
content_types: [report, announcement, product-launch]
industry: [general]
tags: [sprint4, stat-row, statistics, kpi, metrics-inline]
position: body
when_to_use: |
  核心指标展示、数据报告、产品参数。
  适合在正文中横向排列多个关键数据。
when_not_to_use: |
  纵向数据列表用 metrics；
  单个数字用 infographic type:data。
pairs_well_with: [metrics, infographic, compare]
avoid_combining_with: []
anti_pattern: |
  缺少 value 或 label 导致行渲染不完整；
  单行超过 4 个指标在窄屏显示拥挤；
  unit 写在 value 里（应单独填写 unit 字段）。
rows:
  delimiter: "|"
  min_columns: 2
  schema:
    - name: label
      description: 指标名称（如"满意度"、"用户"）
    - name: value
      description: 数值（如"99%"、"12K"）
    - name: unit
      description: 单位（渲染在数字后方，字号更小，可省略）
    - name: note
      description: 补充说明（可省略）
example: |
  :::stat-row
  [{"value":"99%","label":"满意度"},{"value":"12K","label":"用户","unit":"人"}]
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#stat-row"
